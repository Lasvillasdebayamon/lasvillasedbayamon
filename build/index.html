<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Las Villas</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f4f4;
}

.container {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap:16px;
    padding:20px;
}

.card {
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.img {
    height:180px;
    background-size:cover;
    background-position:center;
}

.content {
    padding:12px;
}

h3 {
    margin:0 0 8px 0;
    font-size:18px;
}

.desc {
    font-size:14px;
    color:#666;
}

.price {
    margin-top:10px;
    font-weight:bold;
    color:#1a7f37;
}

@media (max-width:600px) {
    .container {
        grid-template-columns: 1fr;
    }
}
</style>

</head>

<body>

<div class="container">
<div class="card">
    <div class="img" style="background-image:url('')"></div>
    <div class="content">
        <h3>260612</h3>
        <p class="desc"></p>
        <div class="price"></div>
    </div>
</div>
</div>

</body>
</html>
